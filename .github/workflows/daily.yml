name: Daily hydrology paper brief

on:
  schedule:
    # 00:37 UTC is 08:37 China Standard Time.
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily email brief
        env:
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python main.py

      - name: Commit updated sent DOI list
        if: always()
        run: |
          if [ -f sent_dois.json ] && ! git diff --quiet -- sent_dois.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sent_dois.json
            git commit -m "Update sent DOI list"
            git push
          else
            echo "No sent DOI updates to commit."
          fi

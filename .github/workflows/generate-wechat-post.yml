name: Generate WeChat post only

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run ID whose wechat-post-output artifact contains selected-papers-YYYY-MM-DD.json"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  generate-wechat-post:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download selected papers from source run
        uses: actions/download-artifact@v4
        with:
          name: wechat-post-output
          path: outputs/
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate WeChat HTML article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python generate_wechat_post.py

      - name: Upload generated WeChat article
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wechat-post-output
          path: outputs/

      - name: Commit generated WeChat article
        run: |
          if [ -n "$(git status --porcelain -- outputs/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add outputs/
            git commit -m "Generate WeChat post output"
            git push
          else
            echo "No WeChat output updates to commit."
          fi
